<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全角→半角 変換ツール</title>
<style>
  :root {
    --bg: #f4f6fb;
    --panel: #ffffff;
    --border: #d9dfea;
    --accent: #3b6ef6;
    --accent-hover: #2d5be0;
    --text: #1c2432;
    --muted: #6b7688;
    --ok: #17a06a;
    --soft: #eef2fb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 22px;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 6px;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* 開閉式パネル（使い方・設定）共通 */
  details.box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  details.box > summary {
    cursor: pointer;
    padding: 14px 18px;
    font-weight: 600;
    font-size: 0.95rem;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  details.box > summary::-webkit-details-marker { display: none; }
  details.box > summary::before {
    content: "▶";
    font-size: 0.7rem;
    color: var(--accent);
    transition: transform 0.15s;
  }
  details.box[open] > summary::before { transform: rotate(90deg); }
  details.box > summary:hover { background: var(--soft); }
  .box-inner {
    padding: 4px 18px 18px;
  }

  /* 使い方ガイド */
  .steps {
    list-style: none;
    margin: 6px 0 12px;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .steps li {
    flex: 1 1 200px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--soft);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.9rem;
  }
  .step-num {
    flex: 0 0 auto;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .example {
    margin: 4px 0 0;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .example code {
    background: var(--soft);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.9rem;
    color: var(--text);
  }
  .example .arrow { margin: 0 8px; color: var(--accent); font-weight: 700; }

  /* 設定パネル */
  .setting-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .setting {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 10px;
    border-radius: 10px;
    cursor: pointer;
  }
  .setting:hover { background: var(--soft); }
  .setting > input {
    flex: 0 0 auto;
    width: 18px;
    height: 18px;
    margin-top: 2px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .setting-body { display: flex; flex-direction: column; }
  .setting-title { font-weight: 600; font-size: 0.92rem; }
  .setting-desc { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }
  .setting.sub { margin-left: 28px; }
  .setting.sub .setting-title { font-weight: 500; }
  /* 親（改行）がOFFのとき、会話文除外を無効表示にする */
  .setting.disabled { opacity: 0.45; cursor: default; }
  .setting.disabled:hover { background: none; }
  .badge {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 0 5px;
    margin-left: 6px;
    vertical-align: 1px;
  }

  /* 入力・出力 */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 2px 8px rgba(30, 40, 60, 0.04);
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    min-height: 34px;
  }
  .panel-head .label { font-weight: 600; font-size: 0.95rem; }
  textarea {
    width: 100%;
    min-height: 300px;
    resize: vertical;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-family: inherit;
    line-height: 1.7;
    color: var(--text);
    background: #fbfcfe;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); background: #fff; }
  .output-box {
    width: 100%;
    min-height: 300px;
    max-height: 600px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
    background: #f7f9fc;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-box:empty::before {
    content: attr(data-placeholder);
    color: var(--muted);
  }
  .hit {
    background: #ffe08a;
    border-radius: 3px;
    padding: 0 2px;
    font-weight: 700;
  }
  button {
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    transition: background 0.15s, color 0.15s;
  }
  .btn-copy { background: var(--accent); color: #fff; }
  .btn-copy:hover { background: var(--accent-hover); }
  .btn-copy.copied { background: var(--ok); }
  .btn-clear {
    background: #fff;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 7px 16px;
  }
  .btn-clear:hover {
    background: var(--soft);
    color: var(--text);
    border-color: var(--accent);
  }
  .stats {
    text-align: center;
    margin-top: 22px;
    color: var(--muted);
    font-size: 0.9rem;
    min-height: 1.4em;
  }
  .stats b { color: var(--accent); }
  footer {
    text-align: center;
    margin-top: 34px;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>

<div class="wrap">
  <header>
    <h1>全角 → 半角 変換ツール</h1>
    <p>全角の数字・アルファベットを、半角に直します</p>
  </header>

  <!-- 使い方ガイド（初めての方向け） -->
  <details class="box" open>
    <summary>はじめての方へ ── 使い方</summary>
    <div class="box-inner">
      <ol class="steps">
        <li><span class="step-num">1</span>左の枠に文章を貼り付ける</li>
        <li><span class="step-num">2</span>右の枠に半角化した文章が自動で出る</li>
        <li><span class="step-num">3</span>「コピー」ボタンで結果をコピー</li>
      </ol>
      <p class="example">
        例： <code>ＡＢＣ１２３</code> <span class="arrow">→</span> <code>ABC123</code>
        <span style="margin-left:6px">（全角の英数字だけが半角になります。日本語や記号はそのまま）</span>
      </p>
    </div>
  </details>

  <div class="grid">
    <!-- 入力 -->
    <div class="panel">
      <div class="panel-head">
        <span class="label">入力</span>
        <button class="btn-clear" id="clearBtn">クリア</button>
      </div>
      <textarea id="input" placeholder="ここに文章を貼り付けてください&#10;例）ＡＢＣ１２３ → ABC123"></textarea>
    </div>

    <!-- 出力 -->
    <div class="panel">
      <div class="panel-head">
        <span class="label">出力（半角に変換）</span>
        <button class="btn-copy" id="copyBtn">コピー</button>
      </div>
      <div id="output" class="output-box" data-placeholder="ここに変換後の文章が表示されます"></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <!-- 設定パネル（機能のオン・オフ。設定はこのブラウザに保存されます） -->
  <details class="box">
    <summary>設定 ── 機能のオン・オフ（このPCに保存されます）</summary>
    <div class="box-inner">
      <div class="setting-list">

        <label class="setting" id="row-optJoinLines">
          <input type="checkbox" id="optJoinLines">
          <span class="setting-body">
            <span class="setting-title">行をつなげる</span>
            <span class="setting-desc">空行（段落の区切り）はそのまま残し、それ以外の改行はつなげて1つの文章にします。行ごとに短く区切られた原稿を、読みやすい段落にまとめ直すのに使います</span>
          </span>
        </label>

        <label class="setting" id="row-optLineBreak">
          <input type="checkbox" id="optLineBreak">
          <span class="setting-body">
            <span class="setting-title">「。」で段落を分ける</span>
            <span class="setting-desc">「。」ごとに1行あけて改行し、読みやすくします。例：<code>文A。文B。</code> → 文Aと文Bを段落で分けて表示</span>
          </span>
        </label>

        <label class="setting sub" id="row-optExcludeKaigi">
          <input type="checkbox" id="optExcludeKaigi">
          <span class="setting-body">
            <span class="setting-title">会話文「」の中は改行しない</span>
            <span class="setting-desc">例：<code>「行きます。すぐ戻ります。」</code> の中の「。」では改行しません（上の設定がONのときだけ働きます）</span>
          </span>
        </label>

        <label class="setting sub" id="row-optBreakAfterKaigi">
          <input type="checkbox" id="optBreakAfterKaigi">
          <span class="setting-body">
            <span class="setting-title">「」の直後で改行する（ON活かし部分の会話文を見やすくする）</span>
            <span class="setting-desc">例：<code>「言うことを聞かないから殴った。」と彼は言った。</code> → 「」が閉じた直後で改行します（上の設定がONのときだけ働きます）</span>
          </span>
        </label>

        <label class="setting" id="row-optCompactSpaces">
          <input type="checkbox" id="optCompactSpaces">
          <span class="setting-body">
            <span class="setting-title">スペースを詰める</span>
            <span class="setting-desc">文中・行頭にある全角・半角スペースを削除し、3行以上続く空行は1行にまとめます。ニュース原稿など、読みやすさのために入っているスペースを取り除くのに便利です。※英数字と英数字の間のスペース（例：<code>ABC 123</code>）は残します</span>
          </span>
        </label>

        <label class="setting" id="row-optAutoCopy">
          <input type="checkbox" id="optAutoCopy">
          <span class="setting-body">
            <span class="setting-title">貼り付けたら自動でコピー</span>
            <span class="setting-desc">文章を貼り付けると、変換してそのままクリップボードにコピー済みになります。あとは貼り付けたい場所で Ctrl+V するだけ</span>
          </span>
        </label>

        <label class="setting" id="row-optClickFlow">
          <input type="checkbox" id="optClickFlow">
          <span class="setting-body">
            <span class="setting-title">入力欄クリックで丸ごと入れ替え<span class="badge">上級</span></span>
            <span class="setting-desc">入力欄をクリックすると、中身を消して → クリップボードの内容を取り込み → 変換 → コピーまで自動で行います。※クリックで中身が消えます。Chrome / Edge 向け（Firefox では取り込みは動きません）</span>
          </span>
        </label>

      </div>
    </div>
  </details>

  <footer>
    このツールはすべてブラウザ内で動作します。入力した文章が外部に送信されることはありません。
  </footer>
</div>

<script>
  /* ===== 要素の取得 ===== */
  const input   = document.getElementById('input');
  const output  = document.getElementById('output');
  const copyBtn = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');
  const stats   = document.getElementById('stats');

  /* ===== 設定（オン・オフ）とその保存 ===== */
  // 各機能のオン・オフ設定。localStorage に保存して、次回開いたときも保持する。
  // 保存するのはこのオン・オフ設定だけで、入力した文章は保存しない。
  const SETTINGS_KEY = 'hankaku-tool-settings';

  // 設定の初期値（保存がまだ無い人に適用される既定値）
  const DEFAULTS = {
    joinLines: true,        // 行をつなげる
    lineBreak: true,        // 「。」で段落を分ける
    excludeKaigi: true,     // 会話文「」の中は改行しない
    breakAfterKaigi: true,  // 「」の直後で改行する
    compactSpaces: false,   // スペースを詰める（既定はOFF。英数字間のスペースは常に保持）
    autoCopyOnPaste: true,  // 貼り付けたら自動でコピー
    clickFlow: true         // 入力欄クリックで丸ごと入れ替え（初期はON）
  };

  // 設定キーと、対応するチェックボックスのID
  const OPTIONS = [
    { key: 'joinLines',       id: 'optJoinLines' },
    { key: 'lineBreak',       id: 'optLineBreak' },
    { key: 'excludeKaigi',    id: 'optExcludeKaigi' },
    { key: 'breakAfterKaigi', id: 'optBreakAfterKaigi' },
    { key: 'compactSpaces',   id: 'optCompactSpaces' },
    { key: 'autoCopyOnPaste', id: 'optAutoCopy' },
    { key: 'clickFlow',       id: 'optClickFlow' }
  ];

  function loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
      return Object.assign({}, DEFAULTS, saved || {});
    } catch (e) {
      return Object.assign({}, DEFAULTS);
    }
  }
  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(opts));
    } catch (e) {
      /* 保存できない環境（プライベートモード等）でも動作は続ける */
    }
  }

  const opts = loadSettings();

  /* ===== 全角→半角の変換とハイライト表示 ===== */
  const FW = /[Ａ-Ｚａ-ｚ０-９]/;   // 全角の英数字（1文字）を判定する
  let currentOutput = '';           // コピー用の、色なしプレーンテキスト

  // 出力枠を組み立てる。全角の英数字は半角に変換して <span class="hit"> で囲み、
  // それ以外（日本語・記号・改行）はそのまま表示する。
  // 全角文字は半角文字よりコードポイントが 0xFEE0 だけ大きいので、その分を引く。
  function render(src) {
    output.textContent = '';
    let plain = '';
    for (const ch of src) {
      if (FW.test(ch)) {
        const half = String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
        const span = document.createElement('span');
        span.className = 'hit';
        span.textContent = half;
        output.appendChild(span);
        plain += half;
      } else {
        output.appendChild(document.createTextNode(ch));
        plain += ch;
      }
    }
    return plain;
  }

  function countTargets(str) {
    const m = str.match(/[Ａ-Ｚａ-ｚ０-９]/g);
    return m ? m.length : 0;
  }

  // 「。」ごとに改行して1行あける。excludeKaigi が true のときは、
  // 「」の会話文の中にある「。」は改行の対象にしない。
  // breakAfterKaigi が true のときは、「」が閉じた直後で改行する。
  function applyLineBreak(text, excludeKaigi, breakAfterKaigi) {
    let result = '';
    let depth = 0;      // 「」のネストの深さ（>0 なら会話文の中）
    let skipWs = false; // 段落を分けた直後の空白・改行を吸収するフラグ
    const trackKaigi = excludeKaigi || breakAfterKaigi; // 「」の追跡が必要か
    for (const ch of text) {
      let justBroke = false; // 直前の文字で段落分けしたばかりか（二重改行の防止）
      if (skipWs) {
        if (ch === ' ' || ch === '\t' || ch === '　' || ch === '\n' || ch === '\r') {
          continue;
        }
        skipWs = false;
        justBroke = true;
      }
      if (trackKaigi && ch === '「') {
        depth++;
        result += ch;
      } else if (trackKaigi && ch === '」') {
        if (depth > 0) depth--;
        result += ch;
        if (breakAfterKaigi && depth === 0 && !justBroke) {
          result += '\n\n';
          skipWs = true;
        }
      } else if (ch === '。' && (!excludeKaigi || depth === 0)) {
        if (justBroke) {
          result += '。';
        } else {
          result += '。\n\n';
          skipWs = true;
        }
      } else {
        result += ch;
      }
    }
    return result.replace(/\n+$/, '');
  }

  // 英数字（全角・半角）1文字かどうかを判定する
  const ALNUM = /[A-Za-z0-9Ａ-Ｚａ-ｚ０-９]/;
  function isAlnumChar(ch) {
    return !!ch && ALNUM.test(ch);
  }

  // 文中・行頭の全角・半角スペースを削除し、3行以上続く空行は1行にまとめる。
  // ただし英数字と英数字の間のスペース（単語の区切り）は残す。
  function compactSpaces(text) {
    const stripped = text.replace(/[ 　]/g, function (match, offset, str) {
      return (isAlnumChar(str[offset - 1]) && isAlnumChar(str[offset + 1])) ? match : '';
    });
    return stripped.replace(/\n{3,}/g, '\n\n');
  }

  // 空行（段落の区切り）はそのまま残し、それ以外の改行をつなげて1つの文章にする。
  // 各行の前後にある全角・半角スペースは、つなげる際に取り除く。
  function joinLines(text) {
    return text
      .split(/\n{2,}/)
      .map(function (block) {
        return block
          .split('\n')
          .map(function (line) { return line.replace(/^[ 　]+|[ 　]+$/g, ''); })
          .join('');
      })
      .join('\n\n');
  }

  /* ===== 変換の実行（入力が変わるたびに呼ばれる） ===== */
  function update() {
    const src = input.value;
    // 設定に応じてスペース詰め・行つなげ・「。」の段落分けを順に適用してから変換する
    let processed = opts.compactSpaces ? compactSpaces(src) : src;
    processed = opts.joinLines ? joinLines(processed) : processed;
    processed = opts.lineBreak ? applyLineBreak(processed, opts.excludeKaigi, opts.breakAfterKaigi) : processed;
    currentOutput = render(processed);

    const n = countTargets(src);
    if (src.length === 0) {
      stats.textContent = '';
    } else if (n === 0) {
      stats.textContent = '全角の英数字は見つかりませんでした';
    } else {
      stats.innerHTML = '全角の英数字を <b>' + n + '</b> 文字、半角に変換しました';
    }
    resetCopyLabel();
  }

  function resetCopyLabel() {
    copyBtn.classList.remove('copied');
    copyBtn.textContent = 'コピー';
  }

  // 変換結果をクリップボードへ自動コピーする。ブラウザの制約で失敗することも
  // あるため、その場合は静かに諦める（手動のコピーボタンは使える）。
  async function autoCopy() {
    if (!currentOutput) return;
    try {
      await navigator.clipboard.writeText(currentOutput);
      copyBtn.classList.add('copied');
      copyBtn.textContent = 'コピー済み';
    } catch (e) {
      /* 自動コピーが許可されない環境では何もしない */
    }
  }

  /* ===== コピーボタン（手動） ===== */
  copyBtn.addEventListener('click', async function () {
    if (!currentOutput) return;
    try {
      await navigator.clipboard.writeText(currentOutput);
    } catch (e) {
      const tmp = document.createElement('textarea');
      tmp.value = currentOutput;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand('copy');
      document.body.removeChild(tmp);
    }
    copyBtn.classList.add('copied');
    copyBtn.textContent = 'コピーしました';
    setTimeout(resetCopyLabel, 1500);
  });

  /* ===== クリア ===== */
  clearBtn.addEventListener('click', function () {
    input.value = '';
    input.focus();
    update();
  });

  /* ===== 貼り付け → （設定ONなら）自動コピー ===== */
  let pastedNow = false;
  input.addEventListener('paste', function () {
    pastedNow = true;
  });
  input.addEventListener('input', function () {
    update();
    if (pastedNow) {
      pastedNow = false;
      if (opts.autoCopyOnPaste) autoCopy();
    }
  });

  /* ===== 入力欄クリックで丸ごと入れ替え（設定ONのときだけ） ===== */
  input.addEventListener('click', async function () {
    if (!opts.clickFlow) return;      // 設定OFFなら通常のクリックとして扱う
    if (input.value === '') return;   // 空クリックは何もしない
    input.value = '';                 // 1. 中身を消す
    try {
      const clip = await navigator.clipboard.readText();  // 2. クリップボードを取り込む
      if (clip) input.value = clip;
    } catch (e) {
      /* 読み取りが許可されない環境（Firefox 等）ではクリアのみ */
    }
    update();                         // 3. 変換
    autoCopy();                       // 4. 結果を自動コピー
  });

  /* ===== 設定UIの初期化（保存値をチェックボックスへ反映＋変更を保存） ===== */
  // 会話文除外／「」直後の改行は「段落を分ける」がONのときだけ意味を持つので、OFF時は無効表示にする
  function syncKaigiEnabled() {
    ['optExcludeKaigi', 'optBreakAfterKaigi'].forEach(function (id) {
      const el = document.getElementById(id);
      const row = document.getElementById('row-' + id);
      el.disabled = !opts.lineBreak;
      row.classList.toggle('disabled', !opts.lineBreak);
    });
  }

  OPTIONS.forEach(function (o) {
    const el = document.getElementById(o.id);
    el.checked = opts[o.key];   // 保存された設定を反映
    el.addEventListener('change', function () {
      opts[o.key] = el.checked;
      saveSettings();
      if (o.key === 'lineBreak') syncKaigiEnabled();
      update();
    });
  });

  syncKaigiEnabled();
  update();   // 初期表示（設定復元後に一度変換しておく）
</script>
